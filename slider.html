<style>
  /* --- Slider Section --- */
  .slider-section {
    padding: 0px 0;
    background: #fff;
  }
  .swiper {
    width: 100%;
    max-width: 1024px;
    height: auto;
    margin: auto;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0px 0px rgba(0, 0, 0, 0.15);
  }
  .swiper-slide {
    display: flex;
    justify-content: center;
    align-items: center;
    aspect-ratio: 16 / 9;
    transition: transform 0.3s ease;
  }
  .swiper-slide:hover {
    transform: scale(1.02);
  }
  .swiper-slide img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    transition: opacity 0.3s ease;
  }
  .swiper-slide a {
    display: block;
    width: 100%;
    height: 100%;
  }
  .swiper-pagination-bullet {
    background: #fff;
    opacity: 0.7;
    transition: background-color 0.3s ease, opacity 0.3s ease;
  }
  .swiper-pagination-bullet-active {
    background: #a30909;
    opacity: 1;
  }
  .swiper-button-next,
  .swiper-button-prev {
    color: #fff;
    background: rgba(0, 0, 0, 0.4);
    padding: 0px;
    border-radius: 50%;
    backdrop-filter: blur(4px);
    transition: background-color 0.3s ease, transform 0.2s ease;
  }
  .swiper-button-next:hover,
  .swiper-button-prev:hover {
    background: rgba(0, 0, 0, 0.7);
    transform: scale(1.1);
  }
  @media (max-width: 768px) {
    .swiper-slide {
      aspect-ratio: 3 / 2;
    }
  }
  @media (max-width: 480px) {
    .swiper-slide {
      aspect-ratio: 4 / 3;
    }
    .swiper-button-next,
    .swiper-button-prev {
      padding: 8px;
      width: 32px;
      height: 32px;
    }
    .swiper-button-next:after,
    .swiper-button-prev:after {
      font-size: 14px;
    }
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
  // Fisher-Yates shuffle algorithm for randomization
  function shuffleArray(array) {
    const shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
  }

  // Randomize slides (keeping first 3 fixed)
  document.addEventListener('DOMContentLoaded', function() {
    const wrapper = document.getElementById('swiper-wrapper');
    const fixedSlides = wrapper.querySelectorAll('.swiper-slide:not([data-randomizable])');
    const randomizableSlides = Array.from(wrapper.querySelectorAll('.swiper-slide[data-randomizable]'));
    
    // Clear wrapper and re-append in order: fixed + shuffled
    wrapper.innerHTML = '';
    
    // Append fixed slides first
    fixedSlides.forEach(slide => wrapper.appendChild(slide.cloneNode(true)));
    
    // Append randomized slides
    const shuffled = shuffleArray(randomizableSlides);
    shuffled.forEach(slide => wrapper.appendChild(slide.cloneNode(true)));
    
    // Initialize Swiper AFTER DOM is updated
    const swiper = new Swiper('.mySwiper', {
      loop: true,
      grabCursor: true,
      effect: 'slide',
      speed: 400,
      autoplay: {
        delay: 1500,
        disableOnInteraction: false,
        pauseOnMouseEnter: true,
      },
      pagination: {
        el: '.swiper-pagination',
        clickable: true,
        dynamicBullets: true,
      },
      navigation: {
        nextEl: '.swiper-button-next',
        prevEl: '.swiper-button-prev',
      },
      keyboard: {
        enabled: true,
        onlyInViewport: true,
      },
      // Enhanced touch/swipe settings
      touchRatio: 1,
      touchAngle: 45,
      simulateTouch: true,
      shortSwipes: true,
      longSwipes: true,
      longSwipesRatio: 0.5,
      longSwipesMs: 300,
      followFinger: true,
      allowTouchMove: true,
      threshold: 5,
      // Accessibility
      a11y: {
        enabled: true,
        prevSlideMessage: 'Previous slide',
        nextSlideMessage: 'Next slide',
      },
      // Optional: Add fade effect on slide change
      on: {
        slideChangeTransitionStart: function() {
          document.querySelectorAll('.swiper-slide img').forEach(img => {
            img.style.opacity = '0.85';
          });
        },
        slideChangeTransitionEnd: function() {
          document.querySelectorAll('.swiper-slide-active img').forEach(img => {
            img.style.opacity = '1';
          });
        }
      }
    });
  });
</script>
